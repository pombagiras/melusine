    .oracle-card.is-lit .portrait { transform: scale(1.1); filter: saturate(1.08) contrast(1.1) brightness(.92); }
    .oracle-card.is-lit .portrait::after { background: linear-gradient(0deg, rgba(9,6,8,.25), transparent 55%); }

    .ambient { position: absolute; inset: -25%; z-index: 1; pointer-events: none; opacity: .55; background: conic-gradient(from 210deg at 68% 45%, transparent, rgba(154, 30, 65, .12), transparent 25%, rgba(205, 165, 108, .08), transparent 52%); animation: aura 16s linear infinite; }
    @keyframes aura { to { transform: rotate(1turn); } }

    .glass-panel {
      position: absolute; z-index: 3; left: 12px; right: 12px; bottom: 12px;
      padding: 18px 17px 16px; border: 1px solid rgba(255,255,255,.11); border-radius: 20px;
      background: linear-gradient(135deg, rgba(65,53,59,.6), rgba(23,14,20,.5));
      box-shadow: 0 12px 32px rgba(0,0,0,.24), inset 0 1px rgba(255,255,255,.09);
      backdrop-filter: blur(17px) saturate(135%); -webkit-backdrop-filter: blur(17px) saturate(135%);
    }
    .glass-panel::before { content: ''; position: absolute; inset: 0; border-radius: inherit; pointer-events: none; background: linear-gradient(112deg, rgba(255,255,255,.1), transparent 30%); }
    .identity { position: relative; padding-right: 30px; }
    .entity-kind { margin: 0 0 5px; color: var(--brass-light); font-size: 9px; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; }
    .entity-name { margin: 0; font: 600 clamp(28px, 7.5vw, 37px)/1 Fraunces, Georgia, serif; letter-spacing: -.055em; text-wrap: balance; }
    .entity-arch { color: #dbc9af; font-size: 11px; margin-top: 7px; }
    .reading { position: relative; margin: 17px 0 14px; color: #f1e4ce; font-size: 13px; line-height: 1.5; max-width: 34ch; }
    .quote { position: relative; margin: 0 0 16px; padding-left: 11px; color: var(--cream-dim); border-left: 1px solid var(--brass); font: italic 12px/1.4 Fraunces, Georgia, serif; }

    .card-top { position: absolute; z-index: 3; inset: 0 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 17px 17px 0; pointer-events: none; }
    .seal, .lit-status { padding: 7px 9px; border: 1px solid rgba(241,211,160,.19); border-radius: 999px; background: rgba(10,6,8,.28); backdrop-filter: blur(8px); color: var(--cream-dim); font-size: 9px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; }
    .lit-status { display: none; color: #ffdd9d; border-color: rgba(255,171,69,.4); }
    .oracle-card.is-lit .lit-status { display: block; animation: statusIn .5s ease both; }
    @keyframes statusIn { from { opacity: 0; transform: translateY(-5px); } }
    .oracle-card.is-lit .glass-panel, .oracle-card.is-lit .card-top { opacity: 0; transform: translateY(22px); pointer-events: none; transition: opacity .55s ease, transform .65s ease; }
    .oracle-card.is-lit .card-top { transform: translateY(-12px); }

    .actions { position: relative; display: grid; grid-template-columns: 1fr 1.15fr; gap: 9px; }
    .action {
      min-height: 45px; display: inline-flex; justify-content: center; align-items: center; gap: 7px;
      border-radius: 12px; padding: 0 11px; text-decoration: none; cursor: pointer;
      font-size: 10px; font-weight: 700; letter-spacing: .075em; text-transform: uppercase;
      transition: transform .2s ease, filter .2s ease, background .3s ease, border-color .3s ease;
    }
    .action:active { transform: scale(.97); }
    .site-link { color: #1a1111; background: linear-gradient(135deg, #e7c48a, #b9894e); box-shadow: 0 8px 20px rgba(183,127,54,.18); }
    .candle-button { color: var(--cream); border: 1px solid rgba(246,223,187,.25); background: rgba(12,7,10,.32); }
    .candle-button[aria-pressed="true"] { color: #ffe4b3; border-color: rgba(255,167,64,.68); background: rgba(134,32,18,.35); }
    .candle-icon { width: 14px; height: 17px; position: relative; display: inline-block; border-radius: 3px 3px 5px 5px; background: linear-gradient(90deg, #907451, #f0cf96 48%, #9c7951); box-shadow: inset 1px 0 rgba(255,255,255,.3); }
    .candle-icon::before { content: ''; position: absolute; width: 4px; height: 7px; left: 5px; top: -8px; border-radius: 70% 30% 65% 35%; background: #ffbd49; transform: rotate(45deg); opacity: .15; }
    .candle-button[aria-pressed="true"] .candle-icon::before { opacity: 1; box-shadow: 0 -1px 8px 3px #ff542d, 0 -3px 16px 6px rgba(255,87,32,.48); animation: flameTiny .6s ease-in-out infinite alternate; }
    @keyframes flameTiny { to { transform: rotate(34deg) translate(1px, -1px) scale(1.15,.88); } }

    .fire { position: absolute; z-index: 2; inset: 0; overflow: hidden; pointer-events: none; opacity: 0; transition: opacity .65s ease; mix-blend-mode: screen; will-change: opacity; transform: translateZ(0); }
    .oracle-card.is-lit .fire { opacity: 1; }
    .fire-glow { position: absolute; inset: 8% -20% -5%; background: radial-gradient(ellipse at 50% 100%, rgba(255,79,23,.78), rgba(224,29,13,.3) 25%, rgba(109,17,27,.1) 46%, transparent 70%); filter: blur(8px); animation: glow 1.5s ease-in-out infinite alternate; will-change: transform, opacity; transform: translateZ(0); }
    @keyframes glow { to { transform: scale(1.1, 1.05) translateZ(0); opacity: .74; } }
    .flame {
      position: absolute;
      bottom: -12%;
      width: 31%;
      height: 58%;
      border-radius: 50% 50% 38% 38%;
      transform-origin: 50% 100%;
      background: radial-gradient(ellipse at 50% 74%, #fff7bd 0 8%, #ffc141 18%, #ff6425 45%, rgba(192,21,14,.16) 68%, transparent 72%);
      filter: blur(.2px);
      animation: flame 1.1s ease-in-out infinite alternate;
      will-change: transform, border-radius;
      --rot: 0deg;
      --scX: 1;
      --scY: 1;
      transform: rotate(var(--rot)) scale(var(--scX), var(--scY)) translateZ(0);
    }
    .flame::after { content: ''; position: absolute; width: 38%; height: 48%; left: 30%; top: 24%; border-radius: 50% 50% 45% 45%; background: #fff1a3; filter: blur(3px); }
    .flame.one { left: -6%; animation-delay: -.3s; --rot: -7deg; --scX: .9; --scY: 1.2; }
    .flame.two { left: 24%; height: 76%; animation-delay: -.75s; --rot: 4deg; --scX: 1; --scY: 1; }
    .flame.three { left: 54%; height: 67%; animation-delay: -.2s; --rot: -4deg; --scX: 1.05; --scY: .92; }
    .flame.four { left: 81%; height: 52%; animation-delay: -.54s; --rot: 8deg; --scX: 1; --scY: 1; }
    @keyframes flame {
      0% {
        border-radius: 52% 48% 38% 42%;
        transform: rotate(calc(var(--rot) - 4deg)) scale(calc(var(--scX) * 0.94), calc(var(--scY) * 1.06)) translateZ(0);
      }
      100% {
        border-radius: 43% 57% 48% 34%;
        transform: rotate(calc(var(--rot) + 6deg)) scale(calc(var(--scX) * 1.08), calc(var(--scY) * 0.91)) translateZ(0);
      }
    }
    .embers { position: absolute; inset: 0; background-image: radial-gradient(circle, #ffd27b 0 1px, transparent 1.5px), radial-gradient(circle, #ff6c30 0 1.5px, transparent 2px), radial-gradient(circle, #fff0a3 0 1px, transparent 1.5px); background-size: 57px 84px, 91px 112px, 133px 101px; background-position: 13px 110%, 41px 115%, 80px 120%; opacity: .72; animation: embers 5.5s linear infinite; will-change: background-position; transform: translateZ(0); }
    @keyframes embers { to { background-position: 13px -20%, 41px -35%, 80px -25%; } }

    .new-reading { width: max-content; margin: 18px auto 0; padding: 10px 8px; border: 0; color: var(--cream-dim); background: transparent; cursor: pointer; font-size: 10px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; }
    .new-reading::after { content: '↻'; display: inline-block; margin-left: 8px; color: var(--brass); font-size: 14px; vertical-align: -1px; transition: transform .4s ease; }
    .new-reading:hover::after { transform: rotate(180deg); }
    .footnote { margin: auto 5px 0; padding-top: 28px; color: rgba(205,187,154,.62); font-size: 10px; line-height: 1.5; text-align: center; }

    @media (min-width: 530px) { .page { padding-top: 34px; } .oracle-scene { min-height: 620px; } }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; transition-duration: .01ms !important; scroll-behavior: auto !important; }
      .flame, .fire-glow, .embers, .candle-button[aria-pressed="true"] .candle-icon::before {
        animation-duration: inherit !important;
        animation-iteration-count: infinite !important;
      }
      .fire-glow { animation-duration: 1.5s !important; }
      .embers { animation-duration: 5.5s !important; }
      .candle-button[aria-pressed="true"] .candle-icon::before { animation-duration: .6s !important; }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="masthead">
      <a class="brand" href="https://pombagiras.com/" target="_blank" rel="noopener noreferrer" aria-label="Visitar Pombagiras.com">
        <img class="brand-logo" src="https://cdn.pombagiras.com/fotos/FINAL-FAVICON-VIP%20.png" alt="Logo Oráculo" width="30" height="30">
        <span class="brand-title">Oráculo<small>Ferro &amp; Fogo</small></span>
      </a>
      <span class="reading-number" id="readingNumber">sua leitura 01</span>
    </header>

    <section class="intro" aria-labelledby="oracle-title">
      <span class="eyebrow">Uma presença para o agora</span>
      <h1 id="oracle-title" class="speakable-title">O que a noite revela?</h1>
      <p class="speakable-description">Respire. Escolha uma intenção e receba o recado que encontrou você.</p>
    </section>

    <div class="oracle-scene">
      <article class="oracle-card" id="oracleCard" aria-live="polite">
        <button class="card-face card-front" id="revealCard" type="button" aria-label="Revelar a mensagem do oráculo">
          <span class="front-mark" aria-hidden="true">O</span>
          <span class="front-copy">
            <span class="front-kicker">Antes de revelar</span>
            <span class="front-title">Ancoragem de respeito</span>
            <span class="front-text">Não é a pressa que revela. É a presença. Faça silêncio por um instante e toque quando estiver pronta(o).</span>
            <span class="reveal-hint">Tocar para receber <span aria-hidden="true">↓</span></span>
          </span>
        </button>
        <section class="card-face card-back" id="cardBack" aria-label="Mensagem revelada">
          <div class="portrait" id="portrait"></div>
          <div class="ambient"></div>
          <div class="fire" aria-hidden="true">
            <div class="fire-glow"></div><div class="embers"></div>
            <div class="flame one"></div><div class="flame two"></div><div class="flame three"></div><div class="flame four"></div>
          </div>
          <div class="card-top"><span class="seal">Oráculo aberto</span><span class="lit-status">Vela acesa</span></div>
          <div class="glass-panel">
            <div class="identity">
              <p class="entity-kind" id="entityKind"></p>
              <h2 class="entity-name" id="entityName"></h2>
              <p class="entity-arch" id="entityArch"></p>
            </div>
            <p class="reading" id="entityReading"></p>
            <blockquote class="quote" id="entityQuote"></blockquote>
            <div class="actions">
              <a class="action site-link" href="https://pombagiras.com/" target="_blank" rel="noopener noreferrer">Pombagiras.com <span aria-hidden="true">↗</span></a>
              <button class="action candle-button" id="candleButton" type="button" aria-pressed="false"><span class="candle-icon" aria-hidden="true"></span><span id="candleLabel">Acender vela</span></button>
            </div>
          </div>
        </section>
      </article>
    </div>

    <button class="new-reading" id="newReading" type="button">Receber outra leitura</button>
    <p class="footnote">Cada encontro é um convite à presença. Guarde apenas o que fizer sentido para você.</p>
  </main>

  <script>
    const entities = [
      { name: 'Maria Padilha', archetype: 'Realeza & autonomia', message: 'Você não precisa diminuir a própria luz para caber em lugar nenhum. Escolha o que honra a sua coroa e caminhe com firmeza.', quote: 'Quem conhece o próprio valor não negocia a própria paz.', image: 'https://cdn.pombagiras.com/fotos/pombagira_maria_padilha.png' },
      { name: 'Maria Mulambo', archetype: 'Cura & transformação', message: 'Há beleza no que sobreviveu. O que foi deixado para trás pode se tornar matéria da sua nova força.', quote: 'Onde a vida vê fim, eu encontro recomeço.', image: 'https://cdn.pombagiras.com/fotos/pombagira_maria_mulambo.png' },
      { name: 'Maria Quitéria', archetype: 'Coragem & limites', message: 'Proteja o seu território sem se explicar demais. A sua paz também é uma fronteira sagrada.', quote: 'Firmeza não é dureza: é saber onde você não se perde.', image: 'https://cdn.pombagiras.com/fotos/pombagira_maria_quiteria.png' },
      { name: 'Rosa Caveira', archetype: 'Verdade & renovação', message: 'Encerrar um ciclo pode ser o gesto mais amoroso que você faz por si. Deixe cair o que já cumpriu o seu papel.', quote: 'A clareza começa quando a ilusão se desfaz.', image: 'https://cdn.pombagiras.com/fotos/pombagira_rosa_caveira.png' },
      { name: 'Dama da Noite', archetype: 'Mistério & intuição', message: 'Nem toda resposta precisa nascer em voz alta. Escute o que o silêncio vem repetindo com delicadeza.', quote: 'A noite não esconde: ela ensina a enxergar.', image: 'https://cdn.pombagiras.com/fotos/pombagira_dama_da_noite.png' },
      { name: 'Sete Saias', archetype: 'Movimento & alegria', message: 'O caminho pede leveza. Mude o ritmo, abra espaço para a dança e permita que a vida volte a circular.', quote: 'Todo giro consciente abre uma nova passagem.', image: 'https://cdn.pombagiras.com/fotos/pombagira_sete_saias.png' },
      { name: 'Pombagira Cigana', archetype: 'Liberdade & prosperidade', message: 'A abundância acompanha quem se move com verdade. Confie na sua escolha e deixe o medo de escassez para trás.', quote: 'A liberdade é o ouro que ninguém pode tirar.', image: 'https://cdn.pombagiras.com/fotos/pombagira_cigana.png' },
      { name: 'Maria Navalha', archetype: 'Astúcia & proteção', message: 'Use a inteligência antes da pressa. Você não precisa entrar em toda disputa para provar que sabe se defender.', quote: 'Olhos atentos também são uma forma de força.', image: 'https://cdn.pombagiras.com/fotos/pombagira_maria_navalha.png' },
      { name: 'Pombagira da Praia', archetype: 'Fluxo & limpeza', message: 'Solte o que pesa. Como o mar, você pode acolher o movimento sem se prender ao que a onda já levou.', quote: 'O fluxo devolve ao coração o que é essencial.', image: 'https://cdn.pombagiras.com/fotos/pombagira_da_praia.png' },
      { name: 'Maria Farrapo', archetype: 'Verdade & lucidez', message: 'No centro do ruído, escolha uma verdade simples e siga por ela. A sua inteireza não precisa ser perfeita.', quote: 'A alma aparece quando os disfarces cedem.', image: 'https://cdn.pombagiras.com/fotos/pombagira_maria_farrapo.png' },
      { name: 'Pombagira Menina', archetype: 'Leveza & recomeço', message: 'Você pode recomeçar sem pedir permissão. Dê um pequeno passo curioso em direção ao que desperta alegria.', quote: 'Leveza também é coragem em movimento.', image: 'https://cdn.pombagiras.com/fotos/pombagira_menina.png' },
      { name: 'Pombagira da Figueira', archetype: 'Raiz & ancestralidade', message: 'Volte à sua base antes de escolher o próximo rumo. Há uma força antiga em você que sabe sustentar o novo.', quote: 'Raízes profundas não temem o vento.', image: 'https://cdn.pombagiras.com/fotos/pombagira_da_figueira.png' }
    ];

    const card = document.getElementById('oracleCard');
    const revealCard = document.getElementById('revealCard');
    const cardBack = document.getElementById('cardBack');
    const portrait = document.getElementById('portrait');
    const candleButton = document.getElementById('candleButton');
    const candleLabel = document.getElementById('candleLabel');
    let currentEntity;
    let flameActive = false;
    let readingCount = Number(localStorage.getItem('oraculo_reading_count') || 0);

    function storageKey(entity) { return `oraculo_vela_${entity.name.toLowerCase().replaceAll(' ', '_')}`; }
    function candleWasLit(entity) { return localStorage.getItem(storageKey(entity)) === 'true'; }

    function updateCandleUI() {
      card.classList.toggle('is-lit', flameActive);
      candleButton.setAttribute('aria-pressed', String(flameActive));
      candleLabel.textContent = flameActive ? 'Apagar vela' : (candleWasLit(currentEntity) ? 'Acender novamente' : 'Acender vela');
      candleButton.setAttribute('aria-label', flameActive ? `Apagar vela de ${currentEntity.name}` : `Acender vela para ${currentEntity.name}`);
      cardBack.setAttribute('aria-label', flameActive ? `Vela acesa para ${currentEntity.name}. Toque na imagem para apagar a vela.` : `Mensagem revelada de ${currentEntity.name}`);
    }

    function chooseEntity() {
      let next;
      do { next = entities[Math.floor(Math.random() * entities.length)]; } while (entities.length > 1 && next === currentEntity);
      currentEntity = next;
      // Uma nova leitura sempre começa serena: a chama só entra depois do toque consciente.
      flameActive = false;
      card.classList.remove('is-revealed');
      readingCount += 1;
      localStorage.setItem('oraculo_reading_count', String(readingCount));
      document.getElementById('readingNumber').textContent = `sua leitura ${String(readingCount).padStart(2, '0')}`;
      document.getElementById('entityKind').textContent = 'Mensagem da noite';
      document.getElementById('entityName').textContent = next.name;
      document.getElementById('entityArch').textContent = next.archetype;
      document.getElementById('entityReading').textContent = next.message;
      document.getElementById('entityQuote').textContent = `\u201C${next.quote}\u201D`;
      portrait.style.backgroundImage = `url("${next.image}")`;
      updateCandleUI();
    }

    candleButton.addEventListener('click', (event) => {
      event.stopPropagation();
      flameActive = !flameActive;
      // O registro fica no aparelho como memória de que esta vela já foi acesa.
      if (flameActive) localStorage.setItem(storageKey(currentEntity), 'true');
      updateCandleUI();
    });

    revealCard.addEventListener('click', () => {
      card.classList.add('is-revealed');
    });

    cardBack.addEventListener('click', (event) => {
      if (!card.classList.contains('is-lit') || event.target.closest('a, button')) return;
      flameActive = false;
      updateCandleUI();
    });

    document.getElementById('newReading').addEventListener('click', chooseEntity);
    chooseEntity();
  </script>
</body>
</html>
