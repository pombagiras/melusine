<!DOCTYPE html>
<html lang="pt‑BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pombagiras.com | Redirecionando...</title>
    <meta http-equiv="refresh" content="0; url=../index.html">
    <script>
        window.location.replace('../index.html' + window.location.search + window.location.hash);
    </script>
    <!-- Hreflangs para SEO Multilíngue -->
    <link rel="alternate" hreflang="pt" href="https://pombagiras.com/mobile/" />
    
    
    <link rel="alternate" hreflang="x-default" href="https://pombagiras.com/mobile/" />
<style>
    /* â•â•â•â•â•â•â•â•â•â• LANG SWITCHER â•â•â•â•â•â•â•â•â•â• */
    .lang-switcher {
        display: flex;
        gap: 5px;
        align-items: center;
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 9999;
        background: rgba(8, 4, 4, 0.88);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(197, 160, 89, 0.25);
        border-radius: 40px;
        padding: 6px 14px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.5);
        font-family: 'Geist', 'Segoe UI', sans-serif;
    }
    .lang-btn {
        background: none;
        border: none;
        color: rgba(250, 246, 238, 0.55);
        font-family: inherit;
        font-size: 0.73rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        cursor: pointer;
        padding: 3px 8px;
        border-radius: 20px;
        transition: all 0.22s ease;
        text-transform: uppercase;
    }
    .lang-btn:hover, .lang-btn.active {
        color: #C5A059;
        background: rgba(197, 160, 89, 0.13);
    }
    .lang-sep { color: rgba(197, 160, 89, 0.28); font-size: 0.7rem; user-select: none; }
</style>
</head>
<body>
    <p>Redirecionando para a versão unificada e responsiva de Pombagiras.com... Se não for redirecionado, <a href="../index.html">clique aqui</a>.</p>

    <!-- â•â• SELETOR DE IDIOMA / LANGUAGE SWITCHER â•â• -->
    
    <script>
    (function(){
        var sl = localStorage.getItem('user-language') || 'pt';
        var btn = document.getElementById('ls-' + sl);
        if(btn) btn.classList.add('active');
    })();
    function pombLang(lang, url){
        localStorage.setItem('user-language', lang);
        document.querySelectorAll('.lang-btn').forEach(function(b){ b.classList.remove('active'); });
        var b = document.getElementById('ls-' + lang);
        if(b) b.classList.add('active');
        if(url && url !== 'javascript:void(0)') { setTimeout(function(){ window.location.href = url; }, 120); }
    }
    </script>
</body>
</html>
