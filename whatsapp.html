<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>⚡ Encruzilhada Digital • Pombagiras.com</title>
    <meta name="robots" content="noindex, follow">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0108 0%, #1a0514 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Montserrat', sans-serif;
            color: #f5f0ff;
        }
        .portal {
            text-align: center;
            padding: 40px;
            background: rgba(25, 10, 20, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            border: 1px solid rgba(217, 4, 41, 0.3);
            max-width: 400px;
            margin: 20px;
        }
        .roses {
            font-size: 3rem;
            color: #d90429;
            margin-bottom: 20px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }
        .loader {
            width: 60px;
            height: 60px;
            margin: 30px auto;
            border: 3px solid #8b1e5c;
            border-top: 3px solid #d90429;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; margin: 20px 0; color: #c79a2e; }
        .btn {
            display: inline-block;
            padding: 12px 28px;
            background: #25D366;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            margin-top: 20px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn:hover { background: #128C7E; transform: translateY(-3px); }
        .redirect-message { opacity: 0.6; font-size: 0.8rem; margin-top: 20px; }
    </style>
    <script>
        setTimeout(function() {
            window.location.href = "https://bit.ly/4d9EViv";
        }, 2000);
    </script>
</head>
<body>
    <div class="portal">
        <div class="roses">
            <i class="fa-solid fa-rose"></i>
            <i class="fa-solid fa-crown"></i>
            <i class="fa-solid fa-rose"></i>
        </div>
        <h3>Encruzilhada Digital</h3>
        <div class="loader"></div>
        <p><i class="fa-brands fa-whatsapp"></i> Abrindo o portal de mensagens...</p>
        <a href="https://bit.ly/4d9EViv" class="btn">
            <i class="fa-brands fa-whatsapp"></i> Clique aqui se não redirecionar
        </a>
        <p class="redirect-message">🌹 Que a Rosa Caveira guarde sua jornada 🌹</p>
    </div>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</body>
</html>
